<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monumento a la Bandera — Visita Virtual</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="start-overlay">
    <div id="start-card">
      <div id="start-logo">🏛️</div>
      <h1>Monumento a la Bandera</h1>
      <p>Visita Virtual Educativa · Rosario, Argentina</p>
      <button id="start-btn">Comenzar la visita</button>
    </div>
  </div>

  <div id="scene-layer"></div>

  <div id="pins-layer"></div>

  <div id="info-card" class="hidden">
    <button id="info-close" aria-label="Cerrar">✕</button>
    <img id="info-foto" src="" alt="">
    <h2 id="info-titulo"></h2>
    <p id="info-texto"></p>
    <div id="info-pregunta">
      <span class="pregunta-label">🎯 Pregunta para la clase:</span>
      <p id="info-pregunta-texto"></p>
    </div>
  </div>

  <div id="nav-panel" class="hidden">
    <button id="btn-siguiente" class="hidden">Siguiente sala →</button>
    <button id="btn-quiz" class="hidden">🏆 Quiz final</button>
  </div>

  <div id="breadcrumb" class="hidden">
    <span id="breadcrumb-texto"></span>
  </div>

  <div id="quiz-overlay" class="hidden">
    <div id="quiz-card">
      <div id="quiz-numero"></div>
      <h2 id="quiz-pregunta"></h2>
      <div id="quiz-opciones"></div>
      <div id="quiz-resultado" class="hidden"></div>
      <button id="quiz-next" class="hidden">Siguiente pregunta →</button>
    </div>
  </div>

  <div id="hint-drag" class="hidden">← arrastrá para girar →</div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
